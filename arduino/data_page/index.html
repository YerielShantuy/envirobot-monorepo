<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EnviroBot Live Data</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --teal: #00D4AA; --water: #4FC3F7; --soil: #D9A03F; }
body {
  background: #060912; color: #F0F4FF;
  font-family: system-ui, -apple-system, sans-serif;
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
}
header {
  padding: 10px 20px; background: rgba(10,14,26,0.95);
  border-bottom: 1px solid #1F2D45;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  flex-wrap: wrap;
}
#logo { font-size: 14px; letter-spacing: 0.12em; }
#logo span { color: var(--teal); }
.metrics { display: flex; gap: 20px; align-items: baseline; font-family: ui-monospace, monospace; }
.metric { font-size: 11px; color: #4A5880; letter-spacing: 0.06em; }
.metric b { font-size: 20px; color: #F0F4FF; font-weight: 600; display: block; }
#runT.warn { color: #F59E0B; }   /* >=7:00 */
#runT.over { color: #EF4444; }   /* >=8:00, -5 pts */
.head-right { display: flex; align-items: center; gap: 14px; }
#status { font-size: 12px; color: #8899BB; display: inline-flex; align-items: center; gap: 6px; }
#status::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
#status.ok  { color: var(--teal); }
#status.err { color: #EF9A9A; }
a.nav { color: #8899BB; text-decoration: none; font-size: 12px; }
a.nav:active { color: var(--teal); }

main {
  flex: 1; min-height: 0; display: grid;
  grid-template-columns: 1.6fr 1fr; gap: 14px; padding: 14px 20px;
}
@media (max-width: 820px) { main { grid-template-columns: 1fr; overflow-y: auto; } }

.panel { background: #0A0E1A; border: 1px solid #1F2D45; border-radius: 12px; padding: 12px; min-height: 0; display: flex; flex-direction: column; }
.panel h2 { font-size: 11px; letter-spacing: 0.1em; color: #4A5880; font-weight: 600; margin-bottom: 8px; }

/* Arena fills its panel, kept ~square */
#arenaWrap { flex: 1; min-height: 0; position: relative; }
#arena { width: 100%; height: 100%; display: block; border-radius: 8px; }

.side { display: flex; flex-direction: column; gap: 14px; min-height: 0; }
.bars { display: flex; flex-direction: column; gap: 10px; }
.bar-block { }
.bar-block canvas { width: 100%; height: 96px; display: block; }

#tableWrap { flex: 1; min-height: 60px; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 11px; font-family: ui-monospace, monospace; }
th { text-align: left; color: #4A5880; font-weight: 500; padding: 4px 6px; position: sticky; top: 0; background: #0A0E1A; }
td { padding: 4px 6px; border-top: 1px solid #131C2E; color: #C7D2E8; }
td.w { color: var(--water); } td.s { color: var(--soil); }

/* Log strip across the bottom */
#logPanel { grid-column: 1 / -1; max-height: 110px; }
#log { flex: 1; overflow-y: auto; font-size: 11px; font-family: ui-monospace, monospace; }
.log-line { padding: 1px 0; color: #8899BB; }
.log-line.water { color: var(--water); }
.log-line.soil  { color: var(--soil); }
.log-line.err   { color: #EF9A9A; }
</style>
</head>
<body>
<header>
  <span id="logo">ENVIRO<span>BOT</span> · LIVE DATA</span>
  <div class="metrics">
    <div class="metric">RUN<b id="runT">--:--</b></div>
    <div class="metric">SAMPLES<b id="count">0/12</b></div>
    <div class="metric">SECTORS<b id="sectors">0</b></div>
  </div>
  <span class="head-right">
    <span id="status">connecting…</span>
    <a class="nav" href="/">← RC</a>
    <a class="nav" href="/test">🔧 Diag</a>
  </span>
</header>

<main>
  <section class="panel">
    <h2>ARENA · LIVE POSITION</h2>
    <div id="arenaWrap"><canvas id="arena"></canvas></div>
  </section>

  <section class="panel side">
    <div>
      <h2>MEASUREMENTS</h2>
      <div class="bars">
        <div class="bar-block"><canvas id="waterBars"></canvas></div>
        <div class="bar-block"><canvas id="soilBars"></canvas></div>
      </div>
    </div>
    <div id="tableWrap">
      <table>
        <thead><tr><th>ID</th><th>Type</th><th>Sec</th><th>Value</th><th>t</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </section>

  <section class="panel" id="logPanel">
    <h2>LOG</h2>
    <div id="log"><div class="log-line">Waiting for data…</div></div>
  </section>
</main>

<script>
const $ = id => document.getElementById(id);
const statusEl = $('status'), logEl = $('log');
let run = { path: [], samples: [], total_duration_s: 0 };
const seenIds = new Set();

function ts() { return new Date().toLocaleTimeString('en', { hour12: false }); }
function addLog(text, cls) {
  const el = document.createElement('div');
  el.className = 'log-line' + (cls ? ' ' + cls : '');
  el.textContent = ts() + '  ' + text;
  logEl.appendChild(el);
  logEl.scrollTop = logEl.scrollHeight;
  while (logEl.children.length > 60) logEl.removeChild(logEl.firstChild);
}

// ── Arena (ported from webapp lib/arena.ts, vanilla + live: shows all-up-to-now) ──
const ARENA_RADIUS_MM = 750;   // rulebook §5.1: ~1.5 m diameter
function octagonPoints(cx, cy, r) {
  return Array.from({ length: 8 }, (_, i) => {
    const a = (Math.PI / 4) * i - Math.PI / 8;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  });
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r); ctx.closePath();
}
function drawArena(ctx, data) {
  const w = ctx.canvas.width, h = ctx.canvas.height;
  const cx = w / 2, cy = h / 2;
  const S = Math.min(w, h);
  const scale = (S * 0.42) / ARENA_RADIUS_MM;   // mm -> px
  const off = S * 0.178;                          // sector-label centroid offset

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#0A0E1A'; ctx.fillRect(0, 0, w, h);

  const pts = octagonPoints(cx, cy, S * 0.44);
  const trace = () => { ctx.beginPath(); pts.forEach(([x, y], i) => i ? ctx.lineTo(x, y) : ctx.moveTo(x, y)); ctx.closePath(); };

  trace(); ctx.fillStyle = '#0F1621'; ctx.fill();

  // Sector quadrant fills + dividers, clipped to octagon
  const sectorColors = ['rgba(196,168,130,0.22)', 'rgba(74,44,23,0.28)', 'rgba(45,90,27,0.28)', 'rgba(212,180,131,0.20)'];
  const quads = [[0, 0, cx, cy], [cx, 0, w, cy], [0, cy, cx, h], [cx, cy, w, h]];
  ctx.save(); trace(); ctx.clip();
  sectorColors.forEach((c, i) => { const [x1, y1, x2, y2] = quads[i]; ctx.fillStyle = c; ctx.fillRect(x1, y1, x2 - x1, y2 - y1); });
  ctx.strokeStyle = 'rgba(136,153,187,0.28)'; ctx.lineWidth = 1; ctx.setLineDash([5, 5]);
  ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.moveTo(0, cy); ctx.lineTo(w, cy); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();

  trace(); ctx.strokeStyle = '#2A3E5E'; ctx.lineWidth = 2; ctx.stroke();

  // Sector labels
  const sectors = [
    { label: 'SANDPAPER', num: 'S1', x: cx - off, y: cy - off },
    { label: 'WET SOIL',  num: 'S2', x: cx + off, y: cy - off },
    { label: 'GRASS',     num: 'S3', x: cx - off, y: cy + off },
    { label: 'SAND',      num: 'S4', x: cx + off, y: cy + off },
  ];
  ctx.textAlign = 'center';
  sectors.forEach(({ label, num, x, y }) => {
    ctx.font = 'bold 20px ui-monospace, monospace'; ctx.fillStyle = 'rgba(136,153,187,0.09)'; ctx.fillText(num, x, y + 18);
    ctx.font = 'bold 9px ui-monospace, monospace'; ctx.fillStyle = 'rgba(136,153,187,0.62)'; ctx.fillText(label, x, y);
  });
  ctx.textAlign = 'left';

  // Centre start / re-centre marker
  ctx.beginPath(); ctx.arc(cx, cy, 42 * scale, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,212,170,0.4)'; ctx.lineWidth = 2; ctx.setLineDash([4, 4]); ctx.stroke(); ctx.setLineDash([]);

  const path = data.path;
  if (path.length) {
    // Full trail (live = everything so far)
    ctx.beginPath();
    path.forEach((p, i) => { const px = cx + p.x_mm * scale, py = cy - p.y_mm * scale; i ? ctx.lineTo(px, py) : ctx.moveTo(px, py); });
    ctx.strokeStyle = 'rgba(0,212,170,0.60)'; ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.setLineDash([6, 3]); ctx.stroke(); ctx.setLineDash([]);

    // Robot at last point; heading from last movement > 5 mm
    const last = path[path.length - 1];
    let heading = Math.PI / 2;
    for (let i = path.length - 1; i > 0; i--) {
      const a = path[i - 1], b = path[i], dx = b.x_mm - a.x_mm, dy = b.y_mm - a.y_mm;
      if (Math.hypot(dx, dy) > 5) { heading = Math.atan2(dy, dx); break; }
    }
    const rx = cx + last.x_mm * scale, ry = cy - last.y_mm * scale;
    const bodyL = 300 * scale, bodyW = 220 * scale;
    ctx.save(); ctx.translate(rx, ry); ctx.rotate(-heading);
    ctx.fillStyle = 'rgba(0,212,170,0.14)'; ctx.strokeStyle = 'rgba(0,212,170,0.85)'; ctx.lineWidth = 1.5;
    roundRect(ctx, -bodyL / 2, -bodyW / 2, bodyL, bodyW, 5); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bodyL / 2, 0); ctx.lineTo(bodyL / 2 - 10, -6); ctx.lineTo(bodyL / 2 - 10, 6); ctx.closePath();
    ctx.fillStyle = '#00D4AA'; ctx.fill(); ctx.restore();
    ctx.beginPath(); ctx.arc(rx, ry, 4, 0, Math.PI * 2); ctx.fillStyle = '#00D4AA'; ctx.fill();
  }

  // Sample pins at the path point nearest each sample's t_s
  data.samples.forEach(s => {
    if (!path.length) return;
    const closest = path.reduce((best, p) => Math.abs(p.t_s - s.t_s) < Math.abs(best.t_s - s.t_s) ? p : best, path[0]);
    const mx = cx + closest.x_mm * scale, my = cy - closest.y_mm * scale;
    const isW = s.type === 'WATER', color = isW ? '#4FC3F7' : '#D9A03F';
    ctx.beginPath(); ctx.arc(mx, my, 7, 0, Math.PI * 2);
    ctx.fillStyle = color; ctx.strokeStyle = '#0A0E1A'; ctx.lineWidth = 1.5; ctx.fill(); ctx.stroke();
    ctx.font = 'bold 8px ui-monospace, monospace'; ctx.fillStyle = color; ctx.textAlign = 'center';
    ctx.fillText(s.id, mx, my - 11);
  });
  ctx.textAlign = 'left';

  // Scale bar — 500 mm
  const sl = Math.round(500 * scale), sbx = w - sl - 14, sby = h - 14;
  ctx.strokeStyle = 'rgba(136,153,187,0.55)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(sbx, sby); ctx.lineTo(sbx + sl, sby);
  ctx.moveTo(sbx, sby - 5); ctx.lineTo(sbx, sby + 3); ctx.moveTo(sbx + sl, sby - 5); ctx.lineTo(sbx + sl, sby + 3); ctx.stroke();
  ctx.font = '9px ui-monospace, monospace'; ctx.fillStyle = 'rgba(136,153,187,0.55)'; ctx.textAlign = 'center';
  ctx.fillText('500 mm', sbx + sl / 2, sby - 8); ctx.textAlign = 'left';
}

// ── Hand-drawn bar chart (no chart lib — self-contained) ──
function drawBars(cv, items, color, unit, fixedMax) {
  const ctx = cv.getContext('2d');
  const w = cv.width, h = cv.height, padB = 16, padT = 14, padL = 4, padR = 4;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#8899BB'; ctx.font = '9px ui-monospace, monospace'; ctx.textAlign = 'left';
  if (!items.length) { ctx.fillStyle = '#4A5880'; ctx.fillText('no ' + unit + ' samples yet', padL, h / 2); return; }
  const max = fixedMax || Math.max(...items.map(i => i.value)) * 1.15 || 1;
  const plotH = h - padB - padT, plotW = w - padL - padR;
  const bw = Math.min(38, plotW / items.length - 6);
  const gap = (plotW - bw * items.length) / (items.length + 1);
  // baseline
  ctx.strokeStyle = 'rgba(136,153,187,0.25)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(padL, h - padB); ctx.lineTo(w - padR, h - padB); ctx.stroke();
  items.forEach((it, i) => {
    const x = padL + gap + i * (bw + gap);
    const bh = Math.max(2, (it.value / max) * plotH);
    const y = h - padB - bh;
    ctx.fillStyle = color; ctx.fillRect(x, y, bw, bh);
    ctx.fillStyle = '#C7D2E8'; ctx.textAlign = 'center';
    ctx.fillText(it.value.toFixed(1), x + bw / 2, y - 3);
    ctx.fillStyle = '#4A5880'; ctx.fillText(it.label, x + bw / 2, h - 4);
  });
  ctx.textAlign = 'left';
}

// ── Render everything from `run` ──
let arenaCtx = null;
function fitCanvas(cv) { const r = cv.getBoundingClientRect(); cv.width = Math.max(1, Math.round(r.width)); cv.height = Math.max(1, Math.round(r.height)); }
function render() {
  if (arenaCtx) drawArena(arenaCtx, run);
  const water = run.samples.filter(s => s.type === 'WATER').map(s => ({ label: s.id, value: s.value_ntu ?? 0 }));
  const soil  = run.samples.filter(s => s.type === 'SOIL').map(s => ({ label: s.id, value: s.value_pct ?? 0 }));
  drawBars($('waterBars'), water, '#4FC3F7', 'water', null);
  drawBars($('soilBars'), soil, '#D9A03F', 'soil', 100);
  // table
  const rows = run.samples.map(s => {
    const isW = s.type === 'WATER';
    const val = isW ? (s.value_ntu ?? 0).toFixed(1) + ' NTU' : (s.value_pct ?? 0).toFixed(1) + ' %';
    return '<tr><td>' + s.id + '</td><td class="' + (isW ? 'w' : 's') + '">' + s.type + '</td><td>S' + s.sector + '</td><td>' + val + '</td><td>' + (s.t_s != null ? s.t_s.toFixed(0) + 's' : '-') + '</td></tr>';
  }).join('');
  $('tbody').innerHTML = rows;
}

function fmtClock(t) { return t > 0 ? Math.floor(t / 60) + ':' + String(Math.floor(t % 60)).padStart(2, '0') : '--:--'; }

// ── Polling ──
async function seed() {
  try {
    const d = await fetch('/data').then(r => r.json());
    run.path = d.path || [];
    run.samples = d.samples || [];
    run.total_duration_s = d.total_duration_s || 0;
    run.samples.forEach(s => seenIds.add(String(s.id)));
    render();
    if (run.samples.length) addLog('Loaded ' + run.samples.length + ' existing sample(s)');
  } catch { /* robot may have no run yet — start empty */ }
}

// Position + clock @2Hz (doubles as heartbeat)
setInterval(async () => {
  try {
    const p = await fetch('/pos', { signal: AbortSignal.timeout(1500) }).then(r => r.json());
    // append live waypoint (t strictly increasing while a run is live)
    const npts = run.path.length;
    if (!npts || run.path[npts - 1].t_s !== p.t) run.path.push({ t_s: p.t, x_mm: p.x, y_mm: p.y });
    run.total_duration_s = p.t;
    const rt = $('runT');
    rt.textContent = fmtClock(p.t);
    rt.className = p.t >= 480 ? 'over' : p.t >= 420 ? 'warn' : '';
    statusEl.textContent = 'connected'; statusEl.className = 'ok';
    if (arenaCtx) drawArena(arenaCtx, run);
  } catch { statusEl.textContent = 'offline'; statusEl.className = 'err'; }
}, 500);

// Samples every 2s
setInterval(async () => {
  try {
    const d = await fetch('/samples', { signal: AbortSignal.timeout(1800) }).then(r => r.json());
    let added = 0;
    (d.samples || []).forEach(s => {
      if (seenIds.has(String(s.id))) return;
      seenIds.add(String(s.id));
      run.samples.push(s);
      added++;
      const isW = s.type === 'WATER';
      const val = isW ? (s.value_ntu ?? 0).toFixed(1) + ' NTU' : (s.value_pct ?? 0).toFixed(1) + ' %';
      addLog(s.id + '  S' + s.sector + ' ' + s.type + '  ' + val, isW ? 'water' : 'soil');
    });
    $('count').textContent = run.samples.length + '/12';
    $('sectors').textContent = d.sectors_completed ?? new Set(run.samples.map(s => s.sector)).size;
    if (added) render();
  } catch { /* keep last state */ }
}, 2000);

// Resize handling
function onResize() { fitCanvas($('arena')); arenaCtx = $('arena').getContext('2d'); fitCanvas($('waterBars')); fitCanvas($('soilBars')); render(); }
window.addEventListener('resize', onResize);
onResize();
seed();
</script>
</body>
</html>
